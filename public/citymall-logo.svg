<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 190">
  <!-- Square background -->
  <rect x="0" y="0" width="160" height="160" rx="10" fill="#0D3349"/>

  <!-- Orange C shape (thick arc, stroke-based) -->
  <circle cx="80" cy="80" r="46" fill="none" stroke="#F47920" stroke-width="24"
          stroke-dasharray="225 65" stroke-dashoffset="-12"
          stroke-linecap="butt"/>

  <!-- Red angular chevron/arrow inside C opening (right side) -->
  <polygon points="100,56 134,72 100,72" fill="#D64440"/>
  <polygon points="100,88 134,88 100,104" fill="#D64440"/>
  <!-- Middle connector -->
  <rect x="100" y="72" width="8" height="16" fill="#D64440"/>

  <!-- CITY text -->
  <text x="80" y="178"
        text-anchor="middle"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="24"
        fill="#0D3349"
        letter-spacing="3">CITY</text>

  <!-- MALL text -->
  <text x="80" y="194"
        text-anchor="middle"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="16"
        fill="#F47920"
        letter-spacing="5">MALL</text>
</svg>
